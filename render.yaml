services:
  - type: web
    name: ndss-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: web
    name: ndss-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_WS_URL
        value: "wss://ndss-backend.onrender.com/ws"
      - key: VITE_API_URL
        value: "https://ndss-backend.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
